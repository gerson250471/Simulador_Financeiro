<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; padding: 20px; font-family: 'Segoe UI', sans-serif; }
      .header-title { color: #003399; font-weight: bold; font-size: 50px; text-transform: uppercase; }
      .card-simulador { border: 1px solid #007bff; border-radius: 8px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      
      /* Abas Estilizadas conforme o print */
      .nav-tabs { border-bottom: none; }
      .nav-tabs .nav-link { background: #e9ecef; border: 1px solid #007bff; border-bottom: none; color: #555; margin-right: 5px; cursor: pointer; }
      .nav-tabs .nav-link.active { background: #fff; color: #003399; font-weight: bold; border-bottom: 2px solid white; }
      
      .content-body { padding: 30px; }
      label { font-size: 12px; color: #003399; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
      
      /* Fonte Monospace para alinhar as colunas do Combobox */
      .form-select-custom { 
        font-family: 'Courier New', Courier, monospace; 
        font-weight: 600; 
        font-size: 14px; 
        border-color: #007bff; 
      }
      
      .btn-calculate { 
        background-color: #e7f1ff; border: 1px solid #007bff; height: 60px; width: 60px; 
        display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: 0.3s;
      }
      .btn-calculate:hover { background-color: #007bff; }
      .btn-calculate:hover svg { stroke: white; }
      
      .result-area { background-color: #fff; border: 1px solid #007bff; font-size: 22px; font-weight: bold; color: #333; min-height: 80px; }
      /* Nova classe para o container do cabeçalho */
      .header-container {
        display: flex;
        justify-content: space-between; /* Mantém "SIMULADOR" à esquerda e logo à direita */
        align-items: center; /* Alinha verticalmente */
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ddd; /* Linha sutil opcional */
      }

      /* Título "SIMULADOR" */
      .header-title-new {
        color: #003399;
        font-weight: bold;
        font-size: 50px;
        text-transform: uppercase;
        margin: 0;
      }

      /* Classe para a nova logo moeda */
      .logo-coin {
        max-width: 130px; /* Tamanho ajustado para formato moeda */
        height: auto;
        border-radius: 50%; /* Garante o formato circular perfeito */
        box-shadow: 0 4px 8px rgba(0,0,0,0.15); /* Adiciona profundidade profissional */
      }
    </style>
  </head>

             <span style="color: #003399; font-weight: 900; font-size: 20px;">LQL SOLUÇÕES</span>
           </div>

      </div>

      <div class="card-simulador">
        <ul class="nav nav-tabs" id="tabMenu">
          <li class="nav-item"><a class="nav-link active" id="tabEmprestimo" onclick="toggleTab('emprestimo')">Valor do Empréstimo</a></li>
          <li class="nav-item"><a class="nav-link" id="tabParcela" onclick="toggleTab('parcela')">Valor da Parcela</a></li>
        </ul>

        <div class="content-body">
          <div class="row mb-4">
            <div class="col-md-5">
              <label id="labelInputPrincipal">VALOR DO EMPRÉSTIMO</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="text" id="valorInput" class="form-control" placeholder="0,00" oninput="formatarMoeda(this)">
              </div>
            </div>
            <div class="col-md-7">
              <label id="labelCombo">CONVÊNIO</label>
              <select id="convenio" class="form-select form-select-custom">
                <option value="">Carregando tabelas...</option>
              </select>
            </div>
          </div>

          <div class="row align-items-end">
            <div class="col-md-10">
              <label id="labelResultado">VALOR DAS PARCELAS</label>
              <div id="resultado" class="form-control result-area d-flex align-items-center px-4">
                <span style="color: #999; font-size: 16px; font-weight: normal;">Aguardando dados...</span>
              </div>
            </div>
            <div class="col-md-2 d-flex justify-content-center">
              <button type="button" class="btn-calculate" onclick="calcular()" title="Calcular">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#003399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
        let abaAtiva = 'emprestimo';

        // --- NOVA FUNÇÃO DE MÁSCARA ---
        function formatarMoeda(input) {
          let valor = input.value.replace(/\D/g, ""); // Remove tudo que não é número
          valor = (valor / 100).toFixed(2) + "";
          valor = valor.replace(".", ",");
          valor = valor.replace(/(\d)(\d{3}),/g, "$1.$2,");
          valor = valor.replace(/(\d)(\d{3})\./g, "$1.$2.");
          input.value = valor;
        }

        window.onload = function() {
          google.script.run.withSuccessHandler(function(opcoes) {
            const select = document.getElementById("convenio");
            select.innerHTML = '<option value="">Selecione...</option>';
            opcoes.forEach(item => {
              let option = document.createElement("option");
              option.text = item.texto;
              option.value = item.fator;
              select.add(option);
            });
          }).getOpcoesConvenio();
        };

        function toggleTab(tipo) {
          abaAtiva = tipo;
          document.getElementById('tabEmprestimo').classList.toggle('active', tipo === 'emprestimo');
          document.getElementById('tabParcela').classList.toggle('active', tipo === 'parcela');

          if (tipo === 'emprestimo') {
            document.getElementById('labelInputPrincipal').innerText = 'VALOR DO EMPRÉSTIMO';
            document.getElementById('labelCombo').innerText = 'CONVÊNIO';
            document.getElementById('labelResultado').innerText = 'VALOR DAS PARCELAS';
          } else {
            document.getElementById('labelInputPrincipal').innerText = 'VALOR PARCELA';
            document.getElementById('labelCombo').innerText = 'BANCO';
            document.getElementById('labelResultado').innerText = 'VALOR DO EMPRÉSTIMO';
          }
          
          document.getElementById('resultado').innerHTML = "<span style='color: #999; font-size: 16px; font-weight: normal;'>Aguardando cálculo...</span>";
          document.getElementById('valorInput').value = "";
        }

        function calcular() {
          // --- AJUSTE PARA LIMPAR O VALOR ANTES DA CONTA ---
          let valorRaw = document.getElementById("valorInput").value
            .replace(/\./g, "")   // Remove os pontos de milhar
            .replace(",", ".");   // Troca a vírgula por ponto decimal
          
          const valor = parseFloat(valorRaw);
          const fatorInput = document.getElementById("convenio").value;
          const display = document.getElementById("resultado");

          if (isNaN(valor) || valor <= 0) {
            display.innerHTML = "<span class='text-danger'>Insira um valor válido!</span>";
            return;
          }

          if (!fatorInput) {
            display.innerHTML = "<span class='text-danger'>Selecione uma tabela!</span>";
            return;
          }

          const fator = parseFloat(fatorInput.toString().replace(',', '.'));
          let resultadoFinal;
          let prefixo;

          if (abaAtiva === 'emprestimo') {
            resultadoFinal = valor * fator;
            prefixo = "VALOR DA PARCELA: ";
          } else {
            resultadoFinal = valor / fator;
            prefixo = "VALOR DO EMPRÉSTIMO: ";
          }

          display.innerHTML = `${prefixo} R$ ${resultadoFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }
      </script>
  </body>
